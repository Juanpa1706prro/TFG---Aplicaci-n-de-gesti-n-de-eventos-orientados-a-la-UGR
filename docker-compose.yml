services:
  db:
    image: ankane/pgvector:latest
    container_name: ugr_events_db
    restart: always
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: engineer
      POSTGRES_PASSWORD: local_password
    ports:
      - "5433:5432" # Usamos 5433 para evitar conflictos con tu otro proyecto
    volumes:
      - ./infrastructure/postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: ugr_pgadmin
    ports:
      - "5050:80" # Usamos 5050 para no chocar con el puerto 8080 del LAMP
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
